# ============================================
# 机房巡检系统 - 主配置文件
# ============================================
server:
  port: 8080

spring:
  profiles:
    active: dev

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/patrol_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${PATROL_DB_USERNAME:root}
    password: ${PATROL_DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # Redis 配置
  redis:
    host: 127.0.0.1
    port: 6379
    password: ${PATROL_REDIS_PASSWORD:}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson 日期格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ============================================
# MyBatis-Plus 配置
# ============================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.patrol
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ============================================
# JWT 配置
# ============================================
jwt:
  secret: ${PATROL_JWT_SECRET:change-me}
  expiration: 86400000

# ============================================
# MinIO 配置
# ============================================
minio:
  endpoint: ${PATROL_MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${PATROL_MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${PATROL_MINIO_SECRET_KEY:minioadmin}
  bucket: ${PATROL_MINIO_BUCKET:patrol}

# ============================================
# Knife4j / SpringDoc 配置
# ============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: system
      paths-to-match: /system/**
    - group: task
      paths-to-match: /task/**
    - group: location
      paths-to-match: /location/**
    - group: rectify
      paths-to-match: /rectify/**
    - group: ai
      paths-to-match: /ai/**

knife4j:
  enable: true
  setting:
    language: zh_cn
